<title>The Great Lock In</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--black:#080808;--red:#e8001c;--red-dark:#6a0010;--gold:#f5a800;--white:#f0ede8;--gray:#111;--gray2:#181818;--border:#222;--green:#00c853;--blue:#0088ff;--purple:#9b59b6;--orange:#ff6b00;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);color:var(--white);font-family:'Barlow',sans-serif;}
header{padding:28px 18px 18px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0f0000,var(--black));position:relative;overflow:hidden;}
header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 50%,rgba(232,0,28,.07),transparent 60%);pointer-events:none;}
.eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--red);font-weight:700;margin-bottom:5px;}
h1{font-family:'Black Han Sans',sans-serif;font-size:clamp(32px,8vw,64px);line-height:.9;text-transform:uppercase;}
h1 em{color:var(--red);font-style:normal;display:block;}
.sub{margin-top:9px;font-family:'Barlow Condensed',sans-serif;font-size:11px;color:#555;letter-spacing:2px;text-transform:uppercase;}
.stats{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;}
.stat{flex:1;min-width:72px;padding:11px 7px;border-right:1px solid var(--border);text-align:center;}
.stat:last-child{border-right:none;}
.stat-n{font-family:'Black Han Sans',sans-serif;font-size:18px;color:var(--gold);line-height:1;}
.stat-l{font-family:'Barlow Condensed',sans-serif;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:#444;margin-top:3px;}
.legend{display:flex;gap:12px;padding:9px 14px;border-bottom:1px solid var(--border);overflow-x:auto;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:5px;font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:#555;white-space:nowrap;}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
/* MONTH TABS */
.month-tabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.mtab{flex-shrink:0;padding:12px 14px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:none;border:none;color:#333;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;white-space:nowrap;}
.mtab.active{color:var(--white);border-bottom-color:var(--red);}
.mtab:hover{color:#666;}
/* CALENDAR */
.mcontent{display:none;}
.mcontent.active{display:block;}
.cal-wrap{padding:12px 8px;}
.mlabel{font-family:'Black Han Sans',sans-serif;font-size:19px;text-transform:uppercase;margin-bottom:2px;letter-spacing:1px;}
.msub{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#3a3a3a;margin-bottom:12px;}
.dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px;}
.dow{font-family:'Barlow Condensed',sans-serif;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:#252525;text-align:center;padding:4px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cd{background:var(--gray2);border:1px solid var(--border);border-radius:2px;min-height:90px;padding:6px 5px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden;}
.cd:hover{border-color:#444;background:#1d1d1d;z-index:2;}
.cd.empty{background:transparent;border-color:transparent;cursor:default;pointer-events:none;min-height:90px;}
.cd.rest{background:#0c0c0c;cursor:default;}
.cd.rest:hover{background:#0e0e0e;}
.cd.game{background:#160b00;border-color:#3a1a00;}
.cd.game:hover{background:#1e1000;}
.cd.sel{border-color:var(--red)!important;background:#180004!important;}
.cd-date{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:#3a3a3a;margin-bottom:2px;letter-spacing:.5px;}
.cd-dow{font-family:'Barlow Condensed',sans-serif;font-size:7px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px;display:block;}
.cd-title{font-family:'Black Han Sans',sans-serif;font-size:9px;text-transform:uppercase;line-height:1.2;margin-bottom:3px;}
.cd-preview{font-family:'Barlow Condensed',sans-serif;font-size:8px;color:#383838;line-height:1.4;}
.cd-stripe{position:absolute;top:0;left:0;width:3px;height:100%;}
/* PANEL */
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.backdrop.open{display:flex;}
.panel{background:var(--gray);border:1px solid var(--border);border-bottom:none;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;border-radius:4px 4px 0 0;padding:20px 16px 60px;animation:up .2s ease;}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.ptop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.pdate{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--red);margin-bottom:2px;}
.ptitle{font-family:'Black Han Sans',sans-serif;font-size:22px;text-transform:uppercase;line-height:1;}
.pmeta{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-top:3px;}
.xbtn{background:var(--gray2);border:1px solid var(--border);color:#555;width:30px;height:30px;border-radius:2px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:8px;}
.xbtn:hover{color:var(--white);}
.pnote{margin:12px 0 2px;padding:10px 12px;background:rgba(232,0,28,.06);border:1px solid var(--red-dark);font-size:13px;color:#888;line-height:1.6;}
.pnote.gnote{background:rgba(255,107,0,.07);border-color:#7a3800;}
.psec{font-family:'Barlow Condensed',sans-serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;padding:12px 0 6px;display:flex;align-items:center;gap:8px;color:#2e2e2e;}
.psec::after{content:'';flex:1;height:1px;background:var(--border);}
.psec .ct{font-size:8px;color:var(--gold);}
.psec.abs .ct{color:var(--green);}
.llist{display:flex;flex-direction:column;gap:1px;}
.lrow{display:flex;justify-content:space-between;align-items:flex-start;background:var(--gray2);padding:9px 12px;gap:10px;}
.lrow.ab{background:#0a140a;}
.lname{font-size:13px;color:var(--white);flex:1;line-height:1.3;}
.ldetail{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--gold);white-space:nowrap;}
.lrow.ab .ldetail{color:var(--green);}
.lrow.spd{background:#0a0a14;}
.lrow.spd .lname{color:#c8d8ff;}
.ldetail.spdd{color:#6688ff;}
.psec.spd{color:#3a3a6a;}
.psec.spd .ct{color:#6688ff;}
.lnote{font-size:11px;color:#555;margin-top:2px;font-style:italic;display:block;}
.tabs-bar{display:flex;align-items:stretch;border-bottom:1px solid var(--border);position:relative;}
.tabs-bar .month-tabs{flex:1;border-bottom:none;}
.rest-timer-wrap{flex-shrink:0;position:relative;border-left:1px solid var(--border);}
.rest-btn{padding:0 14px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:none;border:none;color:#e8001c;cursor:pointer;height:100%;white-space:nowrap;}
.rest-btn:hover{color:#ff4444;}
.rest-panel{position:absolute;top:100%;right:0;background:#111;border:1px solid var(--border);border-top:none;z-index:50;min-width:200px;}
.rest-panel-inner{padding:16px;}
.rest-display{font-family:'Black Han Sans',sans-serif;font-size:48px;color:var(--white);text-align:center;line-height:1;margin-bottom:12px;letter-spacing:2px;}
.rest-display.running{color:var(--gold);}
.rest-display.done{color:var(--green);}
.rest-controls{display:flex;gap:6px;margin-bottom:10px;}
.rest-ctrl{flex:1;padding:8px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;background:var(--gray2);border:1px solid var(--border);color:var(--white);cursor:pointer;border-radius:2px;}
.rest-ctrl:hover{background:#222;}
.rest-start{width:100%;padding:10px;font-family:'Black Han Sans',sans-serif;font-size:16px;text-transform:uppercase;letter-spacing:2px;background:var(--red);border:none;color:white;cursor:pointer;border-radius:2px;margin-bottom:10px;}
.rest-start:hover{background:#c00016;}
.rest-presets{display:flex;gap:4px;}
.rest-preset{flex:1;padding:6px 4px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;background:var(--gray2);border:1px solid var(--border);color:#888;cursor:pointer;border-radius:2px;}
.rest-preset:hover{color:var(--white);border-color:#444;}
@media(max-width:420px){.cd{min-height:72px;padding:5px 4px;}.cd-title{font-size:8px;}.cal-wrap{padding:8px 5px;}}
</style>
</head>
<body>
<header>
  <div class="eyebrow">The Great Lock In</div>
  <h1>THE<em>GRIND</em></h1>
  <p class="sub">Tap any day · 9 exercises + 3 abs · DB = Dumbbell · Games: Apr 28 · May 5 · May 12</p>
</header>
<div class="stats">
  <div class="stat"><div class="stat-n">116</div><div class="stat-l">Days</div></div>
  <div class="stat"><div class="stat-n">90</div><div class="stat-l">Min/Day</div></div>
  <div class="stat"><div class="stat-n">9+3</div><div class="stat-l">Ex+Abs</div></div>
  <div class="stat"><div class="stat-n">3</div><div class="stat-l">Games</div></div>
  <div class="stat"><div class="stat-n">Jul 31</div><div class="stat-l">Last Day</div></div>
</div>
<div class="legend">
  <div class="legend-item"><div class="dot" style="background:#e8001c"></div>Chest/Tri</div>
  <div class="legend-item"><div class="dot" style="background:#f5a800"></div>Legs/Power</div>
  <div class="legend-item"><div class="dot" style="background:#0088ff"></div>Back/Bi</div>
  <div class="legend-item"><div class="dot" style="background:#9b59b6"></div>Shoulders</div>
  <div class="legend-item"><div class="dot" style="background:#00c853"></div>Recovery/CB</div>
  <div class="legend-item"><div class="dot" style="background:#ff6b00"></div>Game Day</div>
  <div class="legend-item"><div class="dot" style="background:#222"></div>Rest</div>
</div>
<div class="tabs-bar">
  <div class="month-tabs" id="mtabs"></div>
  <div class="rest-timer-wrap" id="restTimerWrap">
    <button class="rest-btn" id="restBtn" onclick="toggleRestTimer()">⏱ REST</button>
    <div class="rest-panel" id="restPanel" style="display:none">
      <div class="rest-panel-inner">
        <div class="rest-display" id="restDisplay">1:30</div>
        <div class="rest-controls">
          <button class="rest-ctrl" onclick="adjustTime(-15)">−15s</button>
          <button class="rest-ctrl" onclick="adjustTime(15)">+15s</button>
        </div>
        <button class="rest-start" id="restStart" onclick="startRestTimer()">START</button>
        <div class="rest-presets">
          <button class="rest-preset" onclick="setTime(60)">1:00</button>
          <button class="rest-preset" onclick="setTime(90)">1:30</button>
          <button class="rest-preset" onclick="setTime(120)">2:00</button>
          <button class="rest-preset" onclick="setTime(180)">3:00</button>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="months"></div>

<div class="backdrop" id="backdrop" onclick="closeP(event)">
  <div class="panel">
    <div class="ptop">
      <div><div class="pdate" id="pd"></div><div class="ptitle" id="pt"></div><div class="pmeta" id="pm"></div></div>
      <button class="xbtn" onclick="document.getElementById('backdrop').classList.remove('open');document.body.style.overflow=''">✕</button>
    </div>
    <div id="pb"></div>
  </div>

const MONTH_RANGES=[
  {label:'April',   sub:'Apr 7–30 · Game 1: Apr 28'},
  {label:'May',     sub:'May 1–31 · Game 2: May 5 · Game 3: May 12'},
  {label:'June',    sub:'Jun 1–30 · Phase 3 Starts Jun 9'},
  {label:'July',    sub:'Jul 1–31 · Final Day: Jul 31'},
];
const MONTH_START_DOW={April:0,May:2,June:0,July:2};// Mon=0 offset for first cell
// Actually compute offsets from dates
// Apr 7 = Monday. Apr 1 = Tuesday (offset 1)
// May 1 = Thursday (offset 3)
// Jun 1 = Sunday (offset 6)
// Jul 1 = Tuesday (offset 1) — wait: Jun has 30 days, Jun 1=Sun → Jul 1 = Tue
const M_OFFSET={April:1,May:3,June:6,July:1};
const M_DAYS_COUNT={April:30,May:31,June:30,July:31};

// Map each ALL entry to its calendar date number and month
const MONTH_NAMES=['April','May','June','July'];
function parseDateStr(s){
  const [mon,d]=s.split(' ');
  const mi={'Jan':1,'Feb':2,'Mar':3,'Apr':4,'May':5,'Jun':6,'Jul':7}[mon];
  return{m:mi,d:parseInt(d)};
}
// assign abs index FIRST before spreading into byMonth
let globalAbsIdx=0;
ALL.forEach(e=>{ e._absIdx=(e.type!=='rest')?globalAbsIdx++:-1; });

// group entries by month (spread AFTER _absIdx is set)
const byMonth={April:[],May:[],June:[],July:[]};
const mMap={4:'April',5:'May',6:'June',7:'July'};
ALL.forEach((entry,i)=>{
  const{m,d}=parseDateStr(entry.d);
  const mn=mMap[m];
  if(mn) byMonth[mn].push({...entry,_dayNum:d,_idx:i});
});

// stripe / tag colors (SC and TC already declared above)
const TITLES={
  'Chest + Triceps':'CHEST','Chest + Triceps (Heavy)':'CHEST','Upper — Max Effort':'UPPER','Upper — FINAL WEEK':'UPPER','Light Upper Body':'LIGHT',
  'Legs + Jumps':'LEGS','Legs — No Mercy':'LEGS','Lower Body Power':'POWER','Lower — Peak Power':'POWER','Lower — FINAL WEEK':'POWER','Light Legs':'LIGHT',
  'Back + Biceps':'BACK','Back + Biceps (Heavy)':'BACK','Pull + Posterior':'PULL','Light Pull':'LIGHT',
  'Shoulders + Traps':'SHOULDER','Shoulders + Core':'SHOULDER','Full Body Conditioning':'FULL BODY','Full Body — Peak':'FULL BODY',
  'Recovery + Core':'RECOVERY','CB Athleticism':'CB WORK','CB Peak Athleticism':'CB PEAK','CB Footwork Only':'CB DRILL','CB Mobility':'CB MOB','Pre-Game Prep':'PRE-GAME','Pre-Game 2 Prep':'PRE-GAME','Pre-Game 3 Prep':'PRE-GAME','Post-Game Recovery':'RECOVERY','CB Final Athleticism':'CB PEAK',
  'GAME DAY 1':'GAME 1 🏈','GAME DAY 2':'GAME 2 🏈','GAME DAY 3':'GAME 3 🏈',
  'REST':'REST','Final Day 🏆':'DONE 🏆',
};

// build tabs
const tabsEl=document.getElementById('mtabs');
const monthsEl=document.getElementById('months');
MONTH_NAMES.forEach((mn,mi)=>{
  const btn=document.createElement('button');
  btn.className='mtab'+(mi===0?' active':'');
  btn.textContent=mn;
  btn.onclick=()=>{
    document.querySelectorAll('.mtab').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.mcontent').forEach(c=>c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('mc-'+mn).classList.add('active');
  };
  tabsEl.appendChild(btn);

  const mc=document.createElement('div');
  mc.className='mcontent'+(mi===0?' active':'');
  mc.id='mc-'+mn;
  mc.innerHTML=`<div class="cal-wrap">
    <div class="mlabel">${mn}</div>
    <div class="msub">${MONTH_RANGES[mi].sub}</div>
    <div class="dow-row"><div class="dow">Mon</div><div class="dow">Tue</div><div class="dow">Wed</div><div class="dow">Thu</div><div class="dow">Fri</div><div class="dow">Sat</div><div class="dow">Sun</div></div>
    <div class="cal-grid" id="cg-${mn}"></div>
  </div>`;
  monthsEl.appendChild(mc);
});

// build each month grid
MONTH_NAMES.forEach(mn=>{
  const grid=document.getElementById('cg-'+mn);
  const offset=M_OFFSET[mn];
  const totalDays=M_DAYS_COUNT[mn];
  const entries=byMonth[mn];
  // build lookup by day number
  const byDay={};
  entries.forEach(e=>byDay[e._dayNum]=e);

  // empty cells for offset
  for(let i=0;i<offset;i++){
    const emp=document.createElement('div');
    emp.className='cd empty';
    grid.appendChild(emp);
  }
  // day cells
  for(let day=1;day<=totalDays;day++){
    const entry=byDay[day];
    const isRest=!entry||entry.type==='rest';
    const isGame=entry&&entry.type==='game';
    const div=document.createElement('div');
    div.className='cd'+(isRest?' rest':'')+(isGame?' game':'');

    const stripe=document.createElement('div');
    stripe.className='cd-stripe';
    stripe.style.background=entry?SC[entry.type]||'#222':'#111';
    div.appendChild(stripe);

    const dateEl=document.createElement('div');
    dateEl.className='cd-date';
    dateEl.textContent=mn.substring(0,3)+' '+day;
    div.appendChild(dateEl);

    if(entry){
      const dowEl=document.createElement('span');
      dowEl.className='cd-dow';
      dowEl.textContent=entry.dow;
      dowEl.style.color=TC[entry.type]||'#333';
      div.appendChild(dowEl);

      const titleEl=document.createElement('div');
      titleEl.className='cd-title';
      titleEl.textContent=TITLES[entry.title]||entry.title;
      div.appendChild(titleEl);

      if(!isRest&&entry.lifts&&entry.lifts.length>0){
        const prev=document.createElement('div');
        prev.className='cd-preview';
        prev.textContent=entry.lifts.slice(0,2).map(l=>l.n.split(' ').slice(0,2).join(' ')).join(' · ');
        div.appendChild(prev);
        div.onclick=()=>openPanel(entry);
      }
    }
    grid.appendChild(div);
  }
});

function openPanel(e){
  document.getElementById('pd').textContent=e.dow+' · '+e.d;
  document.getElementById('pt').textContent=e.title;
  document.getElementById('pm').textContent=e.type==='game'?'🏈 Game Day':e.type==='rest'?'':'⏱ ~90 min · 9 exercises + 3 abs';
  const body=document.getElementById('pb');
  body.innerHTML='';

  if(e.note){
    const n=document.createElement('div');
    n.className='pnote'+(e.type==='game'?' gnote':'');
    n.textContent=e.note;
    body.appendChild(n);
  }

  if(e.lifts&&e.lifts.length>0){
    const s=document.createElement('div');
    s.className='psec';
    s.innerHTML='Exercises <span class="ct">'+e.lifts.length+' movements</span>';
    body.appendChild(s);
    const ll=document.createElement('div');
    ll.className='llist';
    e.lifts.forEach(l=>{
      const r=document.createElement('div');
      r.className='lrow';
      const nd=document.createElement('div');
      const nm=document.createElement('span');
      nm.className='lname';
      nm.textContent=l.n;
      nd.appendChild(nm);
      if(l.note){const nt=document.createElement('span');nt.className='lnote';nt.textContent=l.note;nd.appendChild(nt);}
      const det=document.createElement('div');
      det.className='ldetail';
      det.textContent=l.d;
      r.appendChild(nd);r.appendChild(det);ll.appendChild(r);
    });
    body.appendChild(ll);
  }

  // abs — all non-rest, non-game get abs
  if(e.type!=='rest'&&e._absIdx>=0){
    const as=document.createElement('div');
    as.className='psec abs';
    as.innerHTML='Ab Circuit <span class="ct">3 exercises · rotates daily</span>';
    body.appendChild(as);
    const al=document.createElement('div');
    al.className='llist';
    getAbs(e._absIdx).forEach(ab=>{
      const r=document.createElement('div');
      r.className='lrow ab';
      const nd=document.createElement('div');
      const nm=document.createElement('span');
      nm.className='lname';
      nm.textContent=ab.n;
      nd.appendChild(nm);
      if(ab.note){const nt=document.createElement('span');nt.className='lnote';nt.textContent=ab.note;nd.appendChild(nt);}
      const det=document.createElement('div');
      det.className='ldetail';
      det.textContent=ab.d;
      r.appendChild(nd);r.appendChild(det);al.appendChild(r);
    });
    body.appendChild(al);
  }

  // sprint drills section — show on legs and recovery days
  if(e.type==='legs'||e.type==='recovery'){
    const sd=document.createElement('div');
    sd.className='psec spd';
    sd.innerHTML='Speed Work <span class="ct">before main workout</span>';
    body.insertBefore(sd, body.firstChild.nextSibling||null);
    // insert after note if exists
    const noteEl=body.querySelector('.pnote');
    if(noteEl){ noteEl.after(sd); } else { body.prepend(sd); }

    const sprintData = getSprintDrills(e._absIdx||0, e.type);
    const sl=document.createElement('div');
    sl.className='llist';
    sprintData.forEach(s=>{
      const r=document.createElement('div');
      r.className='lrow spd';
      const nd=document.createElement('div');
      const nm=document.createElement('span');
      nm.className='lname';
      nm.textContent=s.n;
      nd.appendChild(nm);
      if(s.note){const nt=document.createElement('span');nt.className='lnote';nt.textContent=s.note;nd.appendChild(nt);}
      const det=document.createElement('div');
      det.className='ldetail spdd';
      det.textContent=s.d;
      r.appendChild(nd);r.appendChild(det);sl.appendChild(r);
    });
    // insert after sprint section header
    sd.after(sl);
  }

  // highlight selected
  document.querySelectorAll('.cd.sel').forEach(c=>c.classList.remove('sel'));
  document.getElementById('backdrop').classList.add('open');
  document.body.style.overflow='hidden';
}

// ── REST TIMER ────────────────────────────────────────────────────
let restSeconds = 90;
let restInterval = null;
let restRemaining = 90;

function toggleRestTimer(){
  const panel = document.getElementById('restPanel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

function updateDisplay(secs){
  const m = Math.floor(secs/60);
  const s = secs%60;
  document.getElementById('restDisplay').textContent = m+':'+(s<10?'0':'')+s;
}

function adjustTime(delta){
  if(restInterval) return;
  restSeconds = Math.max(15, restSeconds + delta);
  restRemaining = restSeconds;
  updateDisplay(restSeconds);
}

function setTime(secs){
  if(restInterval) return;
  restSeconds = secs;
  restRemaining = secs;
  updateDisplay(secs);
  const d = document.getElementById('restDisplay');
  d.className='rest-display';
}

function startRestTimer(){
  if(restInterval){
    clearInterval(restInterval);
    restInterval = null;
    restRemaining = restSeconds;
    updateDisplay(restSeconds);
    document.getElementById('restDisplay').className='rest-display';
    document.getElementById('restStart').textContent='START';
    return;
  }
  restRemaining = restSeconds;
  document.getElementById('restStart').textContent='STOP';
  document.getElementById('restDisplay').className='rest-display running';
  restInterval = setInterval(()=>{
    restRemaining--;
    updateDisplay(restRemaining);
    if(restRemaining<=0){
      clearInterval(restInterval);
      restInterval=null;
      document.getElementById('restDisplay').textContent='GO!';
      document.getElementById('restDisplay').className='rest-display done';
      document.getElementById('restStart').textContent='START';
      // vibrate if supported
      if(navigator.vibrate) navigator.vibrate([200,100,200,100,400]);
      setTimeout(()=>{
        restRemaining=restSeconds;
        updateDisplay(restSeconds);
        document.getElementById('restDisplay').className='rest-display';
      },2000);
    }
  },1000);
}

function closeP(ev){
  if(ev&&ev.target!==document.getElementById('backdrop'))return;
  document.getElementById('backdrop').classList.remove('open');
  document.body.style.overflow='';
}
</script>
