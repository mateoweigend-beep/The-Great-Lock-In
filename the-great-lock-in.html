<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Privilegios">
<title>Privilegios</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #242424;
  --border: rgba(255,255,255,0.08);
  --text: #f0f0f0;
  --muted: #666;
  --muted2: #444;
  --green: #4ade80;
  --green-bg: rgba(74,222,128,0.12);
  --amber: #fbbf24;
  --amber-bg: rgba(251,191,36,0.12);
  --red: #f87171;
  --red-bg: rgba(248,113,113,0.1);
  --blue: #60a5fa;
  --blue-bg: rgba(96,165,250,0.12);
  --purple: #a78bfa;
  --purple-bg: rgba(167,139,250,0.12);
  --teal: #2dd4bf;
  --teal-bg: rgba(45,212,191,0.12);
  --r: 12px;
  --r-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

/* Layout */
.app { display: flex; flex-direction: column; height: 100%; height: 100dvh; }
.header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.app-title { font-size: 13px; font-weight: 500; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; font-family: 'DM Mono', monospace; }
.week-nav { display: flex; align-items: center; gap: 10px; }
.week-btn { width: 28px; height: 28px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); color: var(--text); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.week-label { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; min-width: 60px; text-align: center; }

/* Kid tabs */
.kid-tabs { display: flex; gap: 8px; }
.kid-tab { flex: 1; padding: 8px 6px; border-radius: var(--r-sm); border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; text-align: center; }
.kid-tab.active { color: var(--text); border-color: transparent; }
.kid-tab.active.mateo { background: var(--purple-bg); border-color: var(--purple); color: var(--purple); }
.kid-tab.active.marcelo { background: var(--teal-bg); border-color: var(--teal); color: var(--teal); }
.kid-tab.active.kid3 { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); }

/* Content */
.content { flex: 1; overflow-y: auto; padding: 16px 20px 100px; -webkit-overflow-scrolling: touch; }

/* Days */
.days-row { display: grid; grid-template-columns: repeat(7,1fr); gap: 5px; margin-bottom: 16px; }
.day-cell { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
.day-name { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; }
.day-dot { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: var(--muted); transition: all 0.15s; }
.day-dot.selected { border-color: var(--text); color: var(--text); background: var(--surface2); }
.day-dot.has-data { border-color: var(--muted2); }
.day-dot.weekend { opacity: 0.5; }
.day-dot.no-lect { border-style: dashed; }

/* Tasks */
.section-label { font-size: 11px; font-weight: 500; color: var(--muted); letter-spacing: .07em; text-transform: uppercase; font-family: 'DM Mono', monospace; margin-bottom: 8px; }
.task-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
.task-item { display: flex; align-items: center; gap: 12px; padding: 13px 14px; background: var(--surface); border-radius: var(--r); border: 1px solid var(--border); cursor: pointer; transition: all 0.12s; active-scale: 0.98; }
.task-item:active { transform: scale(0.98); }
.task-item.checked { border-color: var(--green); background: var(--green-bg); }
.task-item.blocked { opacity: 0.3; cursor: default; }
.task-check { width: 22px; height: 22px; border-radius: 6px; border: 1.5px solid var(--muted2); background: transparent; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
.task-item.checked .task-check { background: var(--green); border-color: var(--green); }
.check-icon { width: 12px; height: 12px; opacity: 0; transition: opacity 0.1s; }
.task-item.checked .check-icon { opacity: 1; }
.task-body { flex: 1; min-width: 0; }
.task-name { font-size: 14px; font-weight: 400; color: var(--text); }
.task-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
.task-pts { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; flex-shrink: 0; }

/* Training toggle */
.training-toggle { display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: var(--surface); border-radius: var(--r-sm); border: 1px solid var(--border); margin-bottom: 12px; cursor: pointer; }
.training-toggle-label { font-size: 12px; color: var(--muted); flex: 1; }
.toggle-switch { width: 36px; height: 20px; border-radius: 10px; background: var(--muted2); position: relative; transition: background 0.2s; flex-shrink: 0; }
.toggle-switch.on { background: var(--amber); }
.toggle-thumb { width: 16px; height: 16px; border-radius: 50%; background: white; position: absolute; top: 2px; left: 2px; transition: left 0.2s; }
.toggle-switch.on .toggle-thumb { left: 18px; }

/* Scores */
.scores-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
.score-card { background: var(--surface); border-radius: var(--r); padding: 12px 14px; border: 1px solid var(--border); }
.score-card-label { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
.score-card-val { font-size: 22px; font-weight: 500; color: var(--text); }
.score-card-val span { font-size: 13px; font-weight: 400; color: var(--muted); }
.score-card-sub { font-size: 11px; margin-top: 3px; }
.bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

/* Privileges */
.priv-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
.priv-item { display: flex; align-items: center; justify-content: space-between; padding: 11px 14px; background: var(--surface); border-radius: var(--r); border: 1px solid var(--border); }
.priv-item-left { flex: 1; min-width: 0; }
.priv-item-name { font-size: 13px; font-weight: 500; color: var(--text); }
.priv-item-detail { font-size: 11px; color: var(--muted); margin-top: 1px; }
.badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; white-space: nowrap; margin-left: 10px; font-family: 'DM Mono', monospace; }
.badge-green { background: var(--green-bg); color: var(--green); }
.badge-amber { background: var(--amber-bg); color: var(--amber); }
.badge-red { background: var(--red-bg); color: var(--red); }
.badge-gray { background: rgba(255,255,255,0.06); color: var(--muted); }

/* Note */
.note { background: var(--surface); border-radius: var(--r); padding: 12px 14px; font-size: 12px; color: var(--muted); line-height: 1.6; border: 1px solid var(--border); margin-bottom: 16px; }

/* Bottom nav */
.bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15,15,15,0.95); border-top: 1px solid var(--border); padding: 10px 20px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); backdrop-filter: blur(20px); }
.reset-btn { width: 100%; padding: 12px; border-radius: var(--r); border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; }

/* Levels bar */
.levels-bar { display: grid; gap: 5px; margin-bottom: 16px; }
.level-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: var(--r-sm); border: 1px solid var(--border); background: var(--surface); opacity: 0.4; transition: opacity 0.2s; }
.level-item.active { opacity: 1; }
.level-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.level-text { font-size: 12px; color: var(--text); flex: 1; }
.level-req { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-top">
      <span class="app-title">Privilegios</span>
      <div class="week-nav">
        <button class="week-btn" onclick="changeWeek(-1)">‹</button>
        <span class="week-label" id="weekLabel"></span>
        <button class="week-btn" onclick="changeWeek(1)">›</button>
      </div>
    </div>
    <div class="kid-tabs">
      <button class="kid-tab mateo active" onclick="switchKid('mateo')">Mateo<br><span style="font-size:10px;opacity:0.7;">14 años</span></button>
      <button class="kid-tab marcelo" onclick="switchKid('marcelo')">Marcelo<br><span style="font-size:10px;opacity:0.7;">13 años</span></button>
      <button class="kid-tab kid3" onclick="switchKid('kid3')">Hijo/a<br><span style="font-size:10px;opacity:0.7;">11 años</span></button>
    </div>
  </div>

  <div class="content" id="content"></div>

  <div class="bottom-bar">
    <button class="reset-btn" onclick="resetWeek()">Limpiar semana actual</button>
  </div>
</div>

<script>
const DAYS_LABELS = ['L','M','X','J','V','S','D'];
const DAYS_FULL = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];

// State
let currentKid = 'mateo';
let currentDay = 0;
let currentWeek = 0; // 0 = current week
let state = JSON.parse(localStorage.getItem('priv_state') || '{}');

function saveState() { localStorage.setItem('priv_state', JSON.stringify(state)); }

function weekKey() {
  const now = new Date();
  now.setDate(now.getDate() + currentWeek * 7);
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((now.getDay()+6)%7));
  return monday.toISOString().slice(0,10);
}

function stateKey(kid, week, day, task) { return `${kid}_${week}_d${day}_${task}`; }
function getChk(kid, day, task) { return state[stateKey(kid, weekKey(), day, task)] || false; }
function setChk(kid, day, task, val) { state[stateKey(kid, weekKey(), day, task)] = val; saveState(); }
function toggleChk(day, task) {
  const blocked = isBlocked(day, task);
  if (blocked) return;
  setChk(currentKid, day, task, !getChk(currentKid, day, task));
  render();
}
function getTraining(day) { return state[stateKey(currentKid, weekKey(), day, '_training')] || false; }
function toggleTraining(day) { state[stateKey(currentKid, weekKey(), day, '_training')] = !getTraining(day); saveState(); render(); }

function isBlocked(day, task) {
  if (currentKid === 'mateo') {
    if (task === 'lectura' && day >= 4) return true; // only Mon-Thu
    if (task === 'estudio' && getTraining(day) && day < 5) return true;
  }
  if (currentKid === 'marcelo') {
    if (task === 'estudio' && getTraining(day) && day < 5) return true;
  }
  return false;
}

function countDays(task, maxD) {
  let c = 0;
  for (let d = 0; d < maxD; d++) if (getChk(currentKid, d, task) && !isBlocked(d, task)) c++;
  return c;
}

// Kid configs
const KIDS = {
  mateo: {
    name: 'Mateo', age: 14, color: 'purple', accent: '#a78bfa',
    tasks: [
      { id: 'cama',    label: 'Tender cama + cuarto', pts: 1 },
      { id: 'lectura', label: 'Leer 25 páginas',      pts: 2, note: 'Solo lunes a jueves' },
      { id: 'estudio', label: 'Estudiar 45 min',      pts: 2 },
    ],
    hasTraining: true,
    getLevels(lD, eD) {
      return [
        { label: 'Llamadas · mensajes · 1.5 hrs', req: 'Leer 4 días', active: lD >= 4, color: '#a78bfa' },
        { label: 'Sube a 3 hrs · Insta 5 min · YT 5 min', req: 'Estudiar 2 días', active: lD >= 4 && eD >= 2, color: '#60a5fa' },
        { label: 'Insta 10 min · YT 10 min · TikTok 15 min', req: 'Estudiar 3 días', active: lD >= 4 && eD >= 3, color: '#4ade80' },
        { label: `TikTok ${Math.min(25, 15 + Math.max(0, eD-3)*5)} min (+5 por día extra)`, req: 'Estudiar 4–5 días', active: lD >= 4 && eD >= 4, color: '#fbbf24' },
      ];
    },
    getPrivs(lD, eD) {
      const n1 = lD >= 4, n2 = n1 && eD >= 2, n3 = n1 && eD >= 3, n4 = n1 && eD >= 4;
      const ttMin = n3 ? Math.min(25, 15 + (eD-3)*5) : 0;
      const iyMin = n3 ? 10 : n2 ? 5 : 0;
      const hrs = n2 ? '3 hrs' : n1 ? '1.5 hrs' : '—';
      return [
        { name: 'Llamadas y mensajes', detail: 'Requiere leer L–J', status: n1 ? 'green' : 'red', label: n1 ? '✓' : lD+'/4 días' },
        { name: 'Pantalla', detail: hrs+'/día', status: n2 ? 'green' : n1 ? 'amber' : 'red', label: hrs },
        { name: 'Instagram', detail: iyMin > 0 ? iyMin+' min/día' : 'bloqueado', status: n2 ? 'green' : n1 ? 'amber' : 'red', label: iyMin > 0 ? iyMin+' min' : eD+'/2 est' },
        { name: 'YouTube', detail: iyMin > 0 ? iyMin+' min/día' : 'bloqueado', status: n2 ? 'green' : n1 ? 'amber' : 'red', label: iyMin > 0 ? iyMin+' min' : '—' },
        { name: 'TikTok', detail: ttMin > 0 ? ttMin+' min/día' : 'requiere estudiar 3+ días', status: n4 ? 'green' : n3 ? 'amber' : 'red', label: ttMin > 0 ? ttMin+' min' : n2 ? eD+'/3 est' : '—' },
        { name: 'Downtime L–V', detail: '8:30 pm', status: 'gray', label: 'fijo' },
        { name: 'Downtime S–D', detail: '11:00 pm', status: 'gray', label: 'fijo' },
      ];
    },
    getNote(lD, eD) {
      if (lD < 4) return `Faltan ${4-lD} día(s) de lectura para el nivel base.`;
      if (eD < 2) return `Lectura completa. Falta ${2-eD} día(s) de estudio para subir a 3 hrs y desbloquear apps.`;
      if (eD < 3) return `3 hrs desbloqueadas. Falta 1 día de estudio para TikTok 15 min.`;
      const ttMin = Math.min(25, 15 + (eD-3)*5);
      if (eD < 5) return `TikTok ${ttMin} min. Si estudia ${5-eD} día(s) más sube a ${Math.min(25,ttMin+5*(5-eD))} min.`;
      return 'Semana completa — todos los privilegios al máximo.';
    }
  },
  marcelo: {
    name: 'Marcelo', age: 13, color: 'teal', accent: '#2dd4bf',
    tasks: [
      { id: 'cama',    label: 'Tender cama + cuarto', pts: 1 },
      { id: 'lectura', label: 'Leer 25 páginas',      pts: 2 },
      { id: 'estudio', label: 'Estudiar 45 min',      pts: 2 },
    ],
    hasTraining: true,
    getLevels(lD, eD) {
      const hrs = (lD >= 5 && eD >= 5) ? '2 hrs' : (lD >= 5 && eD >= 3) ? '1.5 hrs' : '—';
      return [
        { label: 'Llamadas · mensajes · 1.5 hrs · Insta 15 min · YT 15 min', req: 'Leer 5 días + estudiar 3', active: lD >= 5 && eD >= 3, color: '#2dd4bf' },
        { label: 'Sube a 2 hrs de pantalla', req: 'Estudiar 5 días', active: lD >= 5 && eD >= 5, color: '#4ade80' },
      ];
    },
    getPrivs(lD, eD) {
      const base = lD >= 5 && eD >= 3;
      const bonus = lD >= 5 && eD >= 5;
      const hrs = bonus ? '2 hrs' : base ? '1.5 hrs' : '—';
      return [
        { name: 'Llamadas y mensajes', detail: 'Leer 5 días + estudiar 3', status: base ? 'green' : 'red', label: base ? '✓' : !lD>=5 ? lD+'/5 lect' : eD+'/3 est' },
        { name: 'Pantalla', detail: hrs+'/día', status: bonus ? 'green' : base ? 'amber' : 'red', label: hrs },
        { name: 'Instagram', detail: '15 min/día', status: base ? 'green' : 'red', label: base ? '15 min' : '—' },
        { name: 'YouTube', detail: '15 min/día', status: base ? 'green' : 'red', label: base ? '15 min' : '—' },
        { name: 'Downtime L–V', detail: '8:30 pm', status: 'gray', label: 'fijo' },
        { name: 'Downtime S–D', detail: '11:00 pm', status: 'gray', label: 'fijo' },
      ];
    },
    getNote(lD, eD) {
      if (lD < 5) return `Faltan ${5-lD} día(s) de lectura.`;
      if (eD < 3) return `Lectura completa. Faltan ${3-eD} día(s) de estudio para desbloquear todo.`;
      if (eD < 5) return `Acceso base desbloqueado. Si estudia ${5-eD} día(s) más sube a 2 hrs de pantalla.`;
      return 'Semana completa — 2 hrs y todos los privilegios.';
    }
  },
  kid3: {
    name: 'Hijo/a', age: 11, color: 'blue', accent: '#60a5fa',
    tasks: [
      { id: 'cama',    label: 'Tender cama + cuarto', pts: 1 },
      { id: 'lectura', label: 'Leer 25 páginas',      pts: 2 },
      { id: 'estudio', label: 'Estudiar 45 min',      pts: 2 },
    ],
    hasTraining: false,
    getLevels(lD, eD) {
      return [
        { label: 'Llamadas · mensajes · YouTube 15 min', req: 'Leer 5 días + estudiar 3', active: lD >= 5 && eD >= 3, color: '#60a5fa' },
      ];
    },
    getPrivs(lD, eD) {
      const base = lD >= 5 && eD >= 3;
      return [
        { name: 'Llamadas y mensajes', detail: 'Leer 5 días + estudiar 3', status: base ? 'green' : 'red', label: base ? '✓' : '—' },
        { name: 'YouTube', detail: '15 min/día', status: base ? 'green' : 'red', label: base ? '15 min' : '—' },
        { name: 'Downtime L–V', detail: '8:30 pm', status: 'gray', label: 'fijo' },
        { name: 'Downtime S–D', detail: '11:00 pm', status: 'gray', label: 'fijo' },
      ];
    },
    getNote(lD, eD) {
      if (lD < 5 && eD < 3) return `Faltan ${5-lD} día(s) de lectura y ${3-eD} de estudio.`;
      if (lD < 5) return `Faltan ${5-lD} día(s) de lectura.`;
      if (eD < 3) return `Faltan ${3-eD} día(s) de estudio.`;
      return 'Semana completa — todos los privilegios desbloqueados.';
    }
  }
};

function changeWeek(dir) { currentWeek += dir; render(); }
function resetWeek() {
  if (!confirm('¿Limpiar todos los registros de esta semana?')) return;
  const wk = weekKey();
  Object.keys(state).forEach(k => { if (k.includes('_'+wk+'_')) delete state[k]; });
  saveState(); render();
}

function switchKid(kid) {
  currentKid = kid;
  currentDay = 0;
  document.querySelectorAll('.kid-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.kid-tab.'+kid).classList.add('active');
  render();
}

function updateWeekLabel() {
  const now = new Date();
  now.setDate(now.getDate() + currentWeek * 7);
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((now.getDay()+6)%7));
  const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
  const fmt = d => `${d.getDate()}/${d.getMonth()+1}`;
  document.getElementById('weekLabel').textContent = fmt(monday)+'–'+fmt(sunday);
}

function render() {
  updateWeekLabel();
  const kid = KIDS[currentKid];
  const lD = countDays('lectura', currentKid === 'mateo' ? 4 : 5);
  const eD = countDays('estudio', 5);
  const totScore = (() => { let s=0; for(let d=0;d<7;d++) for(const t of kid.tasks) if(getChk(currentKid,d,t.id)&&!isBlocked(d,t.id)) s+=t.pts; return s; })();
  const maxScore = (currentKid === 'mateo' ? 4 : 5) * 2 + 5*2 + 7;

  const isWeekend = currentDay >= 5;
  const isTraining = getTraining(currentDay);

  let html = '';

  // Days row
  html += '<div class="section-label" style="margin-bottom:8px;">Semana</div>';
  html += '<div class="days-row">';
  for (let d = 0; d < 7; d++) {
    const hasData = kid.tasks.some(t => getChk(currentKid, d, t.id));
    const isWe = d >= 5;
    const noLect = currentKid === 'mateo' && d >= 4;
    html += `<div class="day-cell" onclick="selDay(${d})">
      <span class="day-name">${DAYS_LABELS[d]}</span>
      <div class="day-dot${d===currentDay?' selected':''}${isWe?' weekend':''}${hasData?' has-data':''}${noLect?' no-lect':''}">${d+1}</div>
    </div>`;
  }
  html += '</div>';

  // Training toggle (weekdays only, if kid has training)
  if (kid.hasTraining && !isWeekend) {
    html += `<div class="training-toggle" onclick="toggleTraining(${currentDay})">
      <span class="training-label" style="font-size:12px;color:var(--muted);">Día de entrenamiento</span>
      <div class="toggle-switch${isTraining?' on':''}"><div class="toggle-thumb"></div></div>
    </div>`;
  }

  // Tasks
  html += '<div class="section-label">Tareas — '+DAYS_FULL[currentDay]+'</div>';
  html += '<div class="task-list">';
  for (const t of kid.tasks) {
    const blocked = isBlocked(currentDay, t.id);
    const checked = getChk(currentKid, currentDay, t.id) && !blocked;
    let sub = '';
    if (t.id === 'lectura' && currentKid === 'mateo' && currentDay >= 4) sub = 'Solo se registra lunes a jueves';
    else if (blocked && t.id === 'estudio') sub = 'Día de entrenamiento — exento';
    else if (t.note) sub = t.note;
    html += `<div class="task-item${checked?' checked':''}${blocked?' blocked':''}" onclick="toggleChk(${currentDay},'${t.id}')">
      <div class="task-check"><svg class="check-icon" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="${checked?'#0f0f0f':'#4ade80'}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="task-body">
        <div class="task-name">${t.label}</div>
        ${sub ? `<div class="task-sub">${sub}</div>` : ''}
      </div>
      <span class="task-pts">+${t.pts}</span>
    </div>`;
  }
  html += '</div>';

  // Scores
  const pct = Math.min(100, Math.round(totScore/maxScore*100));
  const barColor = pct >= 70 ? '#4ade80' : pct >= 45 ? '#fbbf24' : '#f87171';
  html += '<div class="scores-grid">';
  html += `<div class="score-card"><div class="score-card-label">Puntos semana</div><div class="score-card-val">${totScore}<span>/${maxScore}</span></div><div class="bar"><div class="bar-fill" style="width:${pct}%;background:${barColor}"></div></div></div>`;
  html += `<div class="score-card"><div class="score-card-label">Lectura</div><div class="score-card-val">${lD}<span>/${currentKid==='mateo'?4:5}</span></div><div class="score-card-sub" style="color:${lD>=(currentKid==='mateo'?4:5)?'var(--green)':'var(--muted)'}">días completados</div></div>`;
  html += '</div>';

  // Levels
  const levels = kid.getLevels(lD, eD);
  html += '<div class="section-label">Niveles</div><div class="levels-bar">';
  for (const lv of levels) {
    html += `<div class="level-item${lv.active?' active':''}">
      <div class="level-dot" style="background:${lv.active?lv.color:'var(--muted2)'}"></div>
      <div class="level-text">${lv.label}</div>
      <div class="level-req">${lv.req}</div>
    </div>`;
  }
  html += '</div>';

  // Privileges
  const privs = kid.getPrivs(lD, eD);
  html += '<div class="section-label">Privilegios semana siguiente</div><div class="priv-list">';
  for (const p of privs) {
    html += `<div class="priv-item">
      <div class="priv-item-left"><div class="priv-item-name">${p.name}</div><div class="priv-item-detail">${p.detail}</div></div>
      <span class="badge badge-${p.status}">${p.label}</span>
    </div>`;
  }
  html += '</div>';

  // Note
  html += `<div class="note">${kid.getNote(lD, eD)}</div>`;

  document.getElementById('content').innerHTML = html;
}

function selDay(d) { currentDay = d; render(); }

// Init
const todayDow = (new Date().getDay() + 6) % 7;
currentDay = Math.min(todayDow, 6);
render();
</script>
</body>
</html>
